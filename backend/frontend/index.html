<!doctype html>
<html>
  <head>
    <title>AI Search Engine</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #131921;
        color: white;
      }

      /* NAVBAR */
      .navbar {
        background: #232f3e;
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
        color: #ff9900;
      }

      .search-bar {
        flex: 1;
        display: flex;
      }

      .search-bar input {
        width: 100%;
        padding: 10px;
        border: none;
        outline: none;
        border-radius: 4px 0 0 4px;
      }

      .search-bar button {
        padding: 10px 20px;
        background: #febd69;
        border: none;
        cursor: pointer;
        border-radius: 0 4px 4px 0;
      }

      /* MAIN CONTENT */
      .container {
        padding: 20px;
        width: 70%;
        margin: auto;
      }

      #loading {
        margin-top: 20px;
        color: #ccc;
      }

      .card {
        background: #1f2a36;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        transition: 0.2s;
      }

      .card:hover {
        transform: scale(1.02);
        background: #253241;
      }

      .highlight {
        background: #ff9900;
        color: black;
        padding: 2px 5px;
        border-radius: 3px;
      }

      .title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .desc {
        color: #ccc;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo">Search</div>

      <div class="search-bar">
        <input
          type="text"
          id="query"
          placeholder="Search anything..."
          onkeypress="handleEnter(event)"
        />
        <button onclick="search()">Search</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="container">
      <div id="loading"></div>
      <div id="results"></div>
    </div>

    <script>
      function handleEnter(event) {
        if (event.key === "Enter") {
          search();
        }
      }

      function highlight(text, query) {
        let regex = new RegExp(`(${query})`, "gi");
        return text.replace(regex, `<span class="highlight">$1</span>`);
      }

      async function search() {
        let query = document.getElementById("query").value.trim();

        if (!query) return;

        let resultsDiv = document.getElementById("results");
        let loadingDiv = document.getElementById("loading");

        resultsDiv.innerHTML = "";
        loadingDiv.innerText = "Searching... ⏳";

        try {
          let response = await fetch(
            "/search?query=" + encodeURIComponent(query),
          );
          let data = await response.json();

          loadingDiv.innerText = "";

          data.results.forEach((res, index) => {
            let div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                        <div class="title">Result ${index + 1}</div>
                        <div class="desc">${highlight(res, query)}</div>
                    `;

            resultsDiv.appendChild(div);
          });
        } catch (error) {
          loadingDiv.innerText = "";
          resultsDiv.innerHTML =
            "<p style='color:red;'>Error loading results</p>";
        }
      }
    </script>
  </body>
</html>
